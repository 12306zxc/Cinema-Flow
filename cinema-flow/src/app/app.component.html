<!-- 导航栏 -->
<mat-toolbar color="primary" class="app-toolbar">
  <span class="brand">
    <mat-icon>movie</mat-icon>
    CinemaFlow
  </span>
  <span class="spacer"></span>

  <nav class="nav-links">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon>
      仪表盘
    </a>
    <a mat-button routerLink="/movies" routerLinkActive="active-link">
      <mat-icon>theaters</mat-icon>
      电影列表
    </a>
    <a mat-button routerLink="/directors" routerLinkActive="active-link">
      <mat-icon>person</mat-icon>
      导演库
    </a>
    <a mat-button routerLink="/add" routerLinkActive="active-link">
      <mat-icon>add_circle</mat-icon>
      添加电影
    </a>
    <a mat-button routerLink="/about" routerLinkActive="active-link">
      <mat-icon>info</mat-icon>
      关于
    </a>
  </nav>
  
  <div class="auth-buttons">
    <button mat-button *ngIf="!authService.isLoggedIn" (click)="showLogin()">
      <mat-icon>login</mat-icon> 登录
    </button>
    <button mat-button *ngIf="authService.isLoggedIn" (click)="authService.logout()">
      <mat-icon>logout</mat-icon> 登出
    </button>
  </div>
</mat-toolbar>

<!-- 面包屑导航 -->
<app-breadcrumb></app-breadcrumb>


<!-- 页面内容区域 -->
<main class="main-content">
  <router-outlet></router-outlet>
</main>
