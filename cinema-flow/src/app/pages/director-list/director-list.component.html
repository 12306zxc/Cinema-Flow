<div class="page-container">
    <h1>导演库</h1>
    <div class="director-grid" *ngIf="directors$ | async as directors">
        <a *ngFor="let d of directors" [routerLink]="['/directors', d.id]" class="director-card">
            <h3>{{ d.name }}</h3>
            <p class="nationality">{{ d.nationality }}</p>
            <p class="birth">{{ d.birthYear }} 年生</p>
        </a>
    </div>
</div>
